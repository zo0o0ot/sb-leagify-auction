<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LEAGIFY - Join Draft Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#10141a",
                        "inverse-primary": "#005bc1",
                        "surface-bright": "#353940",
                        "on-secondary-fixed": "#410008",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe16d",
                        "tertiary": "#e9c400",
                        "tertiary-fixed-dim": "#e9c400",
                        "surface-container-highest": "#31353c",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-surface": "#dfe2eb",
                        "inverse-on-surface": "#2d3137",
                        "secondary-fixed": "#ffdad9",
                        "on-secondary-container": "#ffcccb",
                        "inverse-surface": "#dfe2eb",
                        "surface-dim": "#10141a",
                        "outline": "#8d9199",
                        "surface-container-high": "#262a31",
                        "on-tertiary": "#3a3000",
                        "secondary-fixed-dim": "#ffb3b2",
                        "on-primary-container": "#3686ff",
                        "surface-container": "#1c2026",
                        "secondary-container": "#bf012c",
                        "on-error": "#690005",
                        "on-secondary": "#680013",
                        "surface-container-lowest": "#0a0e14",
                        "primary-fixed": "#d8e2ff",
                        "surface-tint": "#adc6ff",
                        "primary-fixed-dim": "#adc6ff",
                        "outline-variant": "#43474e",
                        "surface-container-low": "#181c22",
                        "on-tertiary-container": "#4c3f00",
                        "on-secondary-fixed-variant": "#92001f",
                        "error": "#ffb4ab",
                        "primary": "#adc6ff",
                        "primary-container": "#00204d",
                        "on-primary": "#002e69",
                        "tertiary-container": "#c9a900",
                        "background": "#10141a",
                        "on-surface-variant": "#c4c6cf",
                        "on-primary-fixed": "#001a41",
                        "surface-variant": "#31353c",
                        "on-primary-fixed-variant": "#004493",
                        "secondary": "#ffb3b2",
                        "on-tertiary-fixed": "#221b00",
                        "on-background": "#dfe2eb",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(28, 32, 38, 0.6);
            backdrop-filter: blur(12px);
            outline: 1px solid rgba(67, 71, 78, 0.15);
        }
        .broadcast-glow {
            box-shadow: 0 0 50px rgba(0, 68, 147, 0.2);
        }
        .skew-x-negative {
            transform: skewX(-10deg);
        }
        .skew-x-none {
            transform: skewX(0deg);
        }
        .premium-gradient {
            background: radial-gradient(circle at top center, #1a2333 0%, #0a0e14 100%);
        }
    </style>
</head>
<body class="premium-gradient text-on-surface font-body min-h-screen selection:bg-primary selection:text-on-primary-fixed overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/10 shadow-[0_4px_20px_rgba(0,68,147,0.2)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-[1920px] mx-auto">
<div class="text-2xl font-black italic tracking-tighter text-blue-400 font-headline uppercase">
                LEAGIFY
            </div>
<div class="flex items-center space-x-6">
<span class="font-headline font-bold text-[10px] tracking-widest text-secondary uppercase bg-secondary-container/20 px-2 py-1 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                    LIVE FEED ACTIVE
                </span>
</div>
</div>
</header>
<!-- Main Broadcast Canvas -->
<main class="relative w-full h-screen flex items-center justify-center pt-16">
<!-- Background Theatrical Lighting -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-on-primary-fixed-variant/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[150px]"></div>
</div>
<!-- Join Auction Container -->
<div class="relative z-10 w-full max-w-lg px-6">
<div class="glass-panel p-1 rounded-lg broadcast-glow">
<div class="bg-surface-container p-8 md:p-12 border-t border-l border-white/5 relative overflow-hidden">
<!-- Decorative Corner -->
<div class="absolute top-0 right-0 w-16 h-16 overflow-hidden">
<div class="absolute top-0 right-0 w-full h-full bg-tertiary/10 rotate-45 translate-x-8 -translate-y-8"></div>
</div>
<!-- Header Section -->
<div class="mb-10 text-center relative">
<div class="inline-block px-3 py-1 bg-surface-bright mb-4 skew-x-[-10deg]">
<span class="font-headline text-xs font-black tracking-widest text-primary-fixed-dim uppercase skew-x-[10deg] block">
                                SECURITY AUTHENTICATION REQUIRED
                            </span>
</div>
<h1 class="font-headline text-4xl md:text-5xl font-black uppercase tracking-tighter mb-2 leading-none">
                            JOIN <span class="text-primary italic">WAR ROOM</span>
</h1>
<p class="text-on-surface-variant font-medium tracking-tight text-sm uppercase">
                            Enter credentials to authorize draft access
                        </p>
</div>
<!-- Form Section -->
<form class="space-y-8">
<!-- Join Code Input -->
<div class="space-y-2 group">
<div class="flex justify-between items-center px-1">
<label class="font-headline text-[11px] font-bold tracking-[0.2em] text-tertiary uppercase" for="joinCode">
                                    JOIN CODE
                                </label>
<span class="text-[10px] text-on-surface-variant font-medium">6 CHARACTERS</span>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-3xl md:text-4xl font-headline font-bold tracking-[0.5em] text-on-surface placeholder:text-surface-bright transition-all duration-300 uppercase py-2" id="joinCode" maxlength="6" placeholder="X7R921" type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500 shadow-[0_4px_12px_rgba(173,198,255,0.4)]"></div>
</div>
</div>
<!-- Display Name Input -->
<div class="space-y-2 group">
<div class="flex justify-between items-center px-1">
<label class="font-headline text-[11px] font-bold tracking-[0.2em] text-tertiary uppercase" for="displayName">
                                    COACH NAME
                                </label>
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="person">person</span>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-xl font-headline font-bold tracking-widest text-on-surface placeholder:text-surface-bright transition-all duration-300 uppercase py-2" id="displayName" placeholder="E.G. COACH STEVENS" type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500 shadow-[0_4px_12px_rgba(173,198,255,0.4)]"></div>
</div>
</div>
<!-- Action Button -->
<button class="w-full group relative overflow-hidden mt-4" type="submit">
<div class="bg-gradient-to-r from-primary to-on-primary-container p-[2px] transition-transform duration-200 active:scale-95">
<div class="bg-surface-container-low px-8 py-5 flex items-center justify-center space-x-4 relative">
<span class="font-headline font-black text-xl md:text-2xl tracking-tighter text-on-surface group-hover:text-primary transition-colors uppercase">
                                        JOIN DRAFT ROOM
                                    </span>
<span class="material-symbols-outlined text-2xl text-primary" data-icon="login">login</span>
<!-- Neon Pulse Overlay -->
<div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</div>
</div>
<!-- Shadow Underglow -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-3/4 h-8 bg-on-primary-fixed-variant/40 blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</button>
</form>
<!-- Broadcast Disclaimer -->
<div class="mt-12 flex items-center justify-center space-x-4 opacity-50">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<span class="text-[9px] font-headline font-bold tracking-[0.3em] uppercase whitespace-nowrap">
                            Encrypted Channel • LEAGIFY-SEC-V2
                        </span>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
</div>
</div>
<!-- Background Spotlight for Card -->
<div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-radial-gradient from-on-primary-fixed-variant/10 to-transparent blur-3xl pointer-events-none"></div>
</div>
<!-- Right Side Industrial Detail -->
<div class="hidden lg:block absolute right-12 top-1/2 -translate-y-1/2 opacity-20">
<div class="space-y-4">
<div class="w-1 h-48 bg-outline-variant relative">
<div class="absolute top-0 w-full h-1/4 bg-primary"></div>
</div>
<p class="font-headline font-black text-6xl [writing-mode:vertical-lr] tracking-[0.5em] text-outline-variant">LEAGIFY</p>
</div>
</div>
</main>
<!-- Footer Broadcast Ticker -->
<footer class="fixed bottom-0 w-full h-8 z-50 skew-x-[-10deg] bg-slate-950 border-t-2 border-red-500 shadow-[0_-4px_15px_rgba(233,196,0,0.15)] overflow-hidden">
<div class="flex items-center justify-center space-x-12 px-4 h-full animate-pulse skew-x-[10deg]">
<div class="flex items-center space-x-2">
<span class="text-yellow-500 font-headline font-bold text-[10px] tracking-widest uppercase">BROADCAST TANOOKIZOOT © 2026</span>
</div>
</div>
</footer>
</body></html>
